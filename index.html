<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe - Hard AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎮 Tic-Tac-Toe</h1>
            <p>Can you beat the AI? (Spoiler: You can't! 😎)</p>
        </header>

        <!-- Game Mode -->
        <div class="mode-select">
            <button id="mode-2p" class="mode-btn active" onclick="setMode('2p')">👥 2 Player</button>
            <button id="mode-ai" class="mode-btn" onclick="setMode('ai')">🤖 vs AI (Hard)</button>
        </div>

        <!-- Score Board -->
        <div class="score-board">
            <div class="score-box">
                <span class="player-x">Player X</span>
                <strong id="score-x">0</strong>
            </div>
            <div class="score-box">
                <span>Draw</span>
                <strong id="score-draw">0</strong>
            </div>
            <div class="score-box">
                <span class="player-o">Player O</span>
                <strong id="score-o">0</strong>
            </div>
        </div>

        <!-- Turn Indicator -->
        <div class="turn-indicator" id="turn-indicator">Player X's Turn</div>

        <!-- Game Board -->
        <div class="game-board" id="board">
            <div class="cell" data-index="0" onclick="makeMove(0)"></div>
            <div class="cell" data-index="1" onclick="makeMove(1)"></div>
            <div class="cell" data-index="2" onclick="makeMove(2)"></div>
            <div class="cell" data-index="3" onclick="makeMove(3)"></div>
            <div class="cell" data-index="4" onclick="makeMove(4)"></div>
            <div class="cell" data-index="5" onclick="makeMove(5)"></div>
            <div class="cell" data-index="6" onclick="makeMove(6)"></div>
            <div class="cell" data-index="7" onclick="makeMove(7)"></div>
            <div class="cell" data-index="8" onclick="makeMove(8)"></div>
        </div>

        <!-- Winning Line -->
        <div class="winning-line" id="winning-line"></div>

        <!-- Result -->
        <div class="result" id="result"></div>

        <!-- Controls -->
        <div class="controls">
            <button class="btn-reset" onclick="resetGame()">🔄 New Game</button>
            <button class="btn-reset-all" onclick="resetAll()">🗑️ Reset All Scores</button>
        </div>

        <!-- AI Thinking -->
        <div class="ai-thinking" id="ai-thinking">
            🤖 AI is thinking...
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
